name: nutri_ai_scanner
description: A complete native-feeling Flutter mobile application for AI food scanning, nutrition analysis, and disease risk prediction.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase Core and Services
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  google_sign_in: ^6.2.1

  # State Management & Local Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1

  # Google Gemini AI SDK (food recognition & chat)
  google_generative_ai: ^0.4.6

  # Image Access & Camera
  camera: ^0.10.5+9
  image_picker: ^1.1.2

  # Cache and Connectivity
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3

  # Push Notifications
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Ensure assets (like default loading indicator or images) are mapped if needed
  # assets:
  #   - assets/images/
